<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    :root {
      --bg: hsl(222 16% 11%);
      --surface: hsl(220 14% 15%);
      --border: hsl(220 13% 22%);
      --text: hsl(0 0% 96%);
      --muted: hsl(220 10% 62%);
      --primary: hsl(252 83% 67%);
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; }
    body {
      width: 220px;
      background: var(--bg);
      color: var(--text);
      font-family: 'Geist', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      padding: 6px;
    }
    .menu { display: flex; flex-direction: column; gap: 4px; }
    .menu-item {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      padding: 10px 12px;
      background: transparent;
      border: 1px solid transparent;
      border-radius: 10px;
      color: var(--text);
      font: inherit;
      font-size: 13px;
      font-weight: 500;
      text-align: left;
      cursor: pointer;
      transition: background-color 0.15s ease, border-color 0.15s ease, color 0.15s ease;
    }
    .menu-item:hover {
      background: var(--surface);
      border-color: var(--border);
    }
    .menu-item svg { width: 18px; height: 18px; flex-shrink: 0; color: var(--muted); }
    .menu-item:hover svg { color: var(--primary); }
    .menu-item .sub { display: block; font-size: 11px; font-weight: 400; color: var(--muted); margin-top: 1px; }
    .menu-item .label { display: flex; flex-direction: column; }
  </style>
</head>
<body>
  <div class="menu">
    <button id="open-dashboard" class="menu-item" type="button">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <rect x="3" y="3" width="7" height="7" rx="1"></rect>
        <rect x="14" y="3" width="7" height="7" rx="1"></rect>
        <rect x="3" y="14" width="7" height="7" rx="1"></rect>
        <rect x="14" y="14" width="7" height="7" rx="1"></rect>
      </svg>
      <span class="label">Dashboard<span class="sub">Open the full board</span></span>
    </button>
    <button id="open-sidepanel" class="menu-item" type="button">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <rect x="3" y="3" width="18" height="18" rx="2"></rect>
        <line x1="15" y1="3" x2="15" y2="21"></line>
      </svg>
      <span class="label">Side Menu<span class="sub">Open the side panel</span></span>
    </button>
  </div>
  <script src="popup.js"></script>
</body>
</html>
