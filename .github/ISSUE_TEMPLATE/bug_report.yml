name: Bug report
description: Something isn't working as expected
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report! For **security** issues, do not file here — see SECURITY.md.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you do, what did you expect, and what happened instead?
      placeholder: Steps to reproduce, expected vs actual behaviour.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: TabKan version
      placeholder: "e.g. 4.4 (see chrome://extensions)"
    validations:
      required: false
  - type: input
    id: chrome
    attributes:
      label: Chrome version & OS
      placeholder: "e.g. Chrome 126 on macOS 14"
    validations:
      required: false
  - type: textarea
    id: console
    attributes:
      label: Console errors (optional)
      description: Any errors from the dashboard's DevTools console.
      render: shell
